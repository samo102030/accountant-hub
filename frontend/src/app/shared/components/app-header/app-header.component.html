<header class="sticky top-0 z-50 border-b border-border bg-background">
  <nav
    class="mx-auto flex max-w-[1280px] items-center justify-between px-4 py-3 md:px-12"
  >
    <a routerLink="/" class="font-display text-xl font-bold text-secondary md:text-2xl">
      Accountant Hub
    </a>
    <div class="hidden items-center gap-6 md:flex">
      <a
        routerLink="/"
        routerLinkActive="font-bold text-primary border-b-2 border-primary"
        [routerLinkActiveOptions]="{ exact: true }"
        class="text-on-surface-variant transition-colors hover:text-primary"
      >
        Jobs
      </a>
      @if (isLoggedIn()) {
        <span class="text-sm text-on-surface-variant">{{ user()?.fullName }}</span>
        <button
          type="button"
          (click)="logout()"
          class="text-sm font-semibold text-on-surface-variant transition-colors hover:text-primary"
        >
          Logout
        </button>
      } @else {
        <a
          routerLink="/login"
          class="text-on-surface-variant transition-colors hover:text-primary"
        >
          Login
        </a>
        <a
          routerLink="/register"
          class="rounded-lg bg-primary px-6 py-2 text-sm font-bold text-white transition-opacity hover:opacity-90"
        >
          Register
        </a>
      }
    </div>
    <button type="button" class="p-2 text-on-surface md:hidden" aria-label="Menu">
      <span class="material-symbols-outlined">menu</span>
    </button>
  </nav>
</header>
